<script>
    function handleNavClick(id, btn) { const folder = document.getElementById(id); const isCurrentlyActive = btn.classList.contains('glow-active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('glow-active')); document.querySelectorAll('.folder').forEach(f => f.classList.remove('show')); if (!isCurrentlyActive) { btn.classList.add('glow-active'); folder.classList.add('show'); } }
    function toggleSub(id, headerElement) { document.getElementById(id).classList.toggle('show'); }
    function flashGlow(btn) { btn.classList.add('glow-active'); setTimeout(() => { btn.classList.remove('glow-active'); }, 1000); }
