<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #121212; color: #fff; font-family: sans-serif; padding: 10px; }
    .menu-btn { display: block; width: 100%; background: #333; color: #fff; padding: 12px; margin: 5px 0; text-align: center; text-transform: uppercase; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #555; }
    .content { display: none; padding: 10px; border: 1px solid #444; margin-bottom: 10px; background: #1a1a1a; }
    .slot-btn { width: 30px; font-size: 10px; padding: 5px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; }
</style>
</head>
<body>

    <button class="menu-btn" onclick="document.getElementById('dresser').style.display = (document.getElementById('dresser').style.display === 'block' ? 'none' : 'block')">Dresser</button>
    <div id="dresser" class="content">
        <strong>Lounge</strong><br>
        <button class="slot-btn" onclick="send('Dresser/Lounge','style1')">1</button>
        <button class="slot-btn" onclick="send('Dresser/Lounge','style2')">2</button>
    </div>

    <button class="menu-btn" onclick="document.getElementById('closet').style.display = (document.getElementById('closet').style.display === 'block' ? 'none' : 'block')">Closet</button>
    <div id="closet" class="content">
        <strong>Skirts</strong><br>
        <button class="slot-btn" onclick="send('Closet/Skirts','style1')">1</button>
        <button class="slot-btn" onclick="send('Closet/Skirts','style2')">2</button>
    </div>

    <script>
        function send(part, style) {
            alert("Command Sent: " + part + "," + style);
        }
    </script>
</body>
</html>
