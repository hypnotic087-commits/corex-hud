<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <title>COREX // SYNC</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background: url('closet.jpg') no-repeat center center !important; 
            background-size: cover !important;
            font-family: 'Montserrat', sans-serif; overflow: hidden; color: #ffffff;
        }
        .hud-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            /* Dark grey with 25% opacity (75% transparency) */
            background: rgba(30, 30, 30, 0.25) !important; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; 
            padding: 30px; width: 85%; height: 85%; overflow-y: auto;
            display: flex; gap: 40px;
        }
        .hud-container::-webkit-scrollbar { display: none; }
        
        .hud-title { 
            position: absolute; top: 20px; left: 0; right: 0;
            text-align: center; font-size: 42px; font-weight: 300; 
            text-transform: uppercase; letter-spacing: 8px;
        }

        .nav-column { 
            flex: 1; display: flex; flex-direction: column; gap: 30px; padding-top: 80px;
        }
        
        .nav-btn { 
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); 
            color: #ffffff; padding: 15px; text-transform: uppercase; 
            font-weight: 300; cursor: pointer; width: 100%; 
            font-size: 22px; letter-spacing: 3px; font-family: 'Montserrat', sans-serif;
        }
        
        .remove-hud-btn { 
            margin-top: auto; background: rgba(180, 60, 60, 0.3) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }
        
        .glow-active { border: 2px solid #ffffff !important; box-shadow: 0 0 15px #ffffff !important; }
        
        .content-column { flex: 2; padding-top: 80px; }
        .folder { display: none; margin-top: 5px; }
        .folder.show { display: block; }
        
        .header { 
            background: rgba(255, 255, 255, 0.05); padding: 15px; cursor: pointer; margin-top: 5px; 
            text-transform: uppercase; font-weight: 300; letter-spacing: 1px; font-size: 24px;
        }
        .sub-content { display: none; padding-left: 20px; }
        .sub-content.show { display: block; }
        
        .cat-row { 
            padding: 12px; cursor: pointer; border: 1px solid transparent; 
            font-weight: 300; letter-spacing: 1px; font-size: 24px;
        }
        
        .remove-btn { 
            margin-top: 20px; background: rgba(180, 60, 60, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white; padding: 12px; width: 100%; text-transform: uppercase; 
            font-weight: 300; cursor: pointer; letter-spacing: 1px; font-size: 24px;
        }
    </style>
</head>
<body>

<div class="hud-container">
    <div class="hud-title">COREX // SYNC</div>
    
    <div class="nav-column">
        <button class="nav-btn" onclick="handleNavClick('dresser-f', this)">Dresser</button>
        <button class="nav-btn" onclick="handleNavClick('closet-f', this)">Closet</button>
        <button class="nav-btn" onclick="handleNavClick('wardrobe-f', this)">Wardrobe</button>
        <button class="nav-btn" onclick="handleNavClick('nude-f', this)">Nude</button>
        <button class="nav-btn remove-hud-btn" onclick="flashGlow(this)">Remove HUD</button>
    </div>

    <div class="content-column">
        <div id="nude-f" class="folder"><div class="cat-row" onclick="toggleGlow(this)">Nude Options</div></div>
        
        <div id="dresser-f" class="folder">
            <div class="cat-row" onclick="toggleGlow(this)">Pj's</div>
            <div class="cat-row" onclick="toggleGlow(this)">Lounge</div>
            <div class="cat-row" onclick="toggleGlow(this)">Swim</div>
            <div class="header" onclick="toggleSub('undies-sub', this)">Undies ▼</div>
            <div id="undies-sub" class="sub-content">
                <div class="cat-row" onclick="toggleGlow(this)">Bra's</div>
                <div class="cat-row" onclick="toggleGlow(this)">Panties</div>
                <div class="cat-row" onclick="toggleGlow(this)">Boxers</div>
                <div class="cat-row" onclick="toggleGlow(this)">Briefs</div>
                <div class="cat-row" onclick="toggleGlow(this)">Lingerie</div>
            </div>
            <button class="remove-btn" onclick="flashGlow(this)">Remove Last Attachment</button>
        </div>
        
        <div id="closet-f" class="folder">
            <div class="header" onclick="toggleSub('shirts-sub', this)">Shirts ▼</div>
            <div id="shirts-sub" class="sub-content">
                <div class="cat-row" onclick="toggleGlow(this)">Long Sleeve</div>
                <div class="cat-row" onclick="toggleGlow(this)">Short Sleeve</div>
                <div class="cat-row" onclick="toggleGlow(this)">Tanks</div>
            </div>
            <div class="cat-row" onclick="toggleGlow(this)">Dresses</div>
            <div class="cat-row" onclick="toggleGlow(this)">Pants</div>
            <div class="cat-row" onclick="toggleGlow(this)">Skirts</div>
            <div class="cat-row" onclick="toggleGlow(this)">Shorts</div>
            <div class="cat-row" onclick="toggleGlow(this)">Stockings</div>
            <div class="cat-row" onclick="toggleGlow(this)">Socks</div>
            <button class="remove-btn" onclick="flashGlow(this)">Remove Last Attachment</button>
        </div>
        
        <div id="wardrobe-f" class="folder">
            <div class="header" onclick="toggleSub('seasons-sub', this)">Seasons ▼</div>
            <div id="seasons-sub" class="sub-content">
                <div class="cat-row" onclick="toggleGlow(this)">Spring</div>
                <div class="cat-row" onclick="toggleGlow(this)">Summer</div>
                <div class="cat-row" onclick="toggleGlow(this)">Winter</div>
                <div class="cat-row" onclick="toggleGlow(this)">Autumn</div>
            </div>
            <div class="cat-row" onclick="toggleGlow(this)">Casual</div>
            <div class="cat-row" onclick="toggleGlow(this)">Club</div>
            <div class="cat-row" onclick="toggleGlow(this)">Formal</div>
            <div class="cat-row" onclick="toggleGlow(this)">Sleep</div>
            <div class="cat-row" onclick="toggleGlow(this)">Roleplay</div>
            <div class="cat-row" onclick="toggleGlow(this)">Shopping</div>
            <div class="cat-row" onclick="toggleGlow(this)">Swimwear</div>
            <button class="remove-btn" onclick="flashGlow(this)">Remove Last Attachment</button>
        </div>
    </div>
</div>

<script>
    function handleNavClick(id, btn) {
        const folder = document.getElementById(id);
        const isCurrentlyActive = btn.classList.contains('glow-active');

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('glow-active'));
        document.querySelectorAll('.folder').forEach(f => f.classList.remove('show'));
        
        if (!isCurrentlyActive) {
            btn.classList.add('glow-active');
            folder.classList.add('show');
        }
    }

    function toggleSub(id, headerElement) { 
        document.getElementById(id).classList.toggle('show'); 
        toggleGlow(headerElement);
    }

    function toggleGlow(btn) { 
        btn.classList.toggle('glow-active'); 
    }

    function flashGlow(btn) {
        btn.classList.add('glow-active');
        setTimeout(() => {
            btn.classList.remove('glow-active');
        }, 1000);
    }
</script>
</body>
</html>
