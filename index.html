<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100vh;
            background: url('closet.jpg') no-repeat center center !important; 
            background-size: cover !important;
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden;
        }

        .hud-container { 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.35); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            padding: 40px; 
            width: 85%; height: 85%;
            overflow-y: auto; color: #936d41;
            display: flex; flex-direction: column;
        }

        .hud-container::-webkit-scrollbar { display: none; }

        .nav-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .nav-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #936d41; padding: 25px; flex: 1; text-transform: uppercase; font-weight: bold; font-size: 16px; cursor: pointer; }
        .nav-btn.active { background: rgba(255, 255, 255, 0.25); border-color: #fff; }
        
        .folder { margin-top: 20px; display: none; }
        .folder.show { display: block; }
        
        .header { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .sub-content { display: none; padding-left: 30px; background: rgba(0,0,0,0.1); }
        .sub-content.show { display: block; }
        
        /* Style Slots container */
        .style-slots { display: none; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); margin-top: 5px; }
        .style-slots.active { display: flex; gap: 8px; }

        .cat-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; font-size: 16px; cursor: pointer; }
        .rect-btn { width: 35px; height: 30px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; margin-left: 8px; }
        .remove-btn { margin-top: 30px; background: rgba(180, 60, 60, 0.3); border: 1px solid rgba(200, 50, 50, 0.4); color: #ffcccc; padding: 20px; width: 100%; text-transform: uppercase; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="nav-row">
            <button class="nav-btn" onclick="toggleFolder('nude-f', this)">Nude</button>
            <button class="nav-btn" onclick="toggleFolder('dresser-f', this)">Dresser</button>
            <button class="nav-btn" onclick="toggleFolder('closet-f', this)">Closet</button>
        </div>
        <div class="nav-row">
            <button class="nav-btn" onclick="toggleFolder('wardrobe-f', this)">Wardrobe</button>
            <button class="nav-btn">Minimize</button>
        </div>

        <!-- CLOSET -->
        <div id="closet-f" class="folder">
            <div class="header" onclick="toggleSub('shirts-sub')">Shirts ▼</div>
            <div id="shirts-sub" class="sub-content">
                <div class="cat-row" onclick="moveSlots(this)"><span>Long Sleeve</span></div>
                <div class="cat-row" onclick="moveSlots(this)"><span>Short Sleeve</span></div>
            </div>
            <div class="cat-row" onclick="moveSlots(this)"><span>Dresses</span></div>
            
            <button class="remove-btn">Remove Last Attachment</button>
        </div>
    </div>

    <!-- The single slot area that moves dynamically -->
    <div id="style-slots-area" class="style-slots">
        <button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button>
    </div>

    <script>
        function toggleFolder(id, btn) {
            document.getElementById(id).classList.toggle('show');
            btn.classList.toggle('active');
        }
        function toggleSub(id) { document.getElementById(id).classList.toggle('show'); }
        
        function moveSlots(element) {
            const slots = document.getElementById('style-slots-area');
            // Move the slots right after the clicked category
            element.after(slots);
            slots.classList.add('active');
        }
    </script>
</body>
</html>
