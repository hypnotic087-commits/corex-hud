<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX // SYNC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Links exactly to the image you just uploaded */
            background-image: url('9ff85e9aea171b842a2bd0540b1f0054.jpg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Adds a heavy dark tint and a slight blur so your white menus stay easily readable */
            background-color: rgba(15, 15, 15, 0.75); 
            background-blend-mode: overlay;
            backdrop-filter: blur(2px);
            
            color: #ffffff;
            font-family: 'Segoe UI Light', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            overflow: hidden; 
        }
        
        .header {
            text-align: center;
            font-size: 28px; 
            font-weight: 300; 
            letter-spacing: 6px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 15px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            align-items: start; 
        }
        .category-container {
            width: 100%;
        }

        /* THIN-BORDERED RECTANGULAR BUTTONS */
        .btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            color: #ffffff;
            padding: 16px 0; 
            border-radius: 0px; 
            font-size: 16px; 
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn i {
            margin-right: 10px;
            font-size: 16px;
        }
        
        .btn:hover {
            background: rgba(220, 220, 220, 0.9);
            color: #1a1a1a;
            border-color: rgba(220, 220, 220, 0.9);
        }

        /* SUB-MENUS */
        .submenu {
            display: none; 
            flex-direction: column;
            gap: 8px;
            padding: 10px 0 0 0; 
        }
        
        .nested-submenu {
            padding-left: 0;
            margin-top: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 8px;
        }

        .sub-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #cccccc;
            padding: 12px 0; 
            border-radius: 0px; 
            font-size: 13px; 
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .sub-btn:hover {
            background: rgba(220, 220, 220, 0.9);
            color: #1a1a1a;
            border-color: rgba(220, 220, 220, 0.9);
        }

        .nested-submenu > .remove-btn {
            grid-column: span 2; 
        }

        .remove-btn {
            color: #ff8888;
            border-color: rgba(255, 136, 136, 0.4);
        }
        .remove-btn:hover {
            background: rgba(255, 100, 100, 0.9);
            color: #ffffff;
            border-color: rgba(255, 100, 100, 0.9);
        }

        .minimize-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .btn-minimize {
            width: 100%; 
            font-size: 14px; 
            padding: 16px 0; 
        }
    </style>
</head>
<body>

    <div class="header">COREX // SYNC</div>

    <div class="grid">
        
        <!-- DRESSER -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('dresser-menu')"><i class="fa-solid fa-box-archive"></i> Dresser</button>
            <div id="dresser-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Dresser', 'Lounge')">Lounge</button>
                <button class="sub-btn" onclick="sendToSL('Dresser', 'PJs')">PJ's</button>
                <button class="sub-btn" onclick="sendToSL('Dresser', 'Swim')">Swim</button>
                <button class="sub-btn" onclick="sendToSL('Dresser', 'Lingerie')">Lingerie</button>
                
                <!-- Nested Underwear Menu -->
                <button class="sub-btn" onclick="toggleMenu('underwear-menu', true)">Underwear ►</button>
                <div id="underwear-menu" class="submenu nested-submenu">
                    <button class="sub-btn" onclick="sendToSL('Dresser/Underwear', 'Bras')">Bras</button>
                    <button class="sub-btn" onclick="sendToSL('Dresser/Underwear', 'Panties')">Panties</button>
                    <button class="sub-btn" onclick="sendToSL('Dresser/Underwear', 'Pasties')">Pasties</button>
                    <button class="sub-btn" onclick="sendToSL('Dresser/Underwear', 'Boxers')">Boxers</button>
                    <button class="sub-btn" onclick="sendToSL('Dresser/Underwear', 'Briefs')">Briefs</button>
                    <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
                </div>
                
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- CLOSET -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('closet-menu')"><i class="fa-solid fa-door-closed"></i> Closet</button>
            <div id="closet-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Closet', 'Shirts')">Shirts</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Pants')">Pants</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Shorts')">Shorts</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Skirts')">Skirts</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Tank Tops')">Tank Tops</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Sweaters')">Sweaters</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- WARDROBE -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('wardrobe-menu')"><i class="fa-solid fa-shirt"></i> Wardrobe</button>
            <div id="wardrobe-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Casual')">Casual</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Club')">Club</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Formal')">Formal</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Shopping')">Shopping</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Sleep')">Sleep</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Roleplay')">Roleplay</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- SHOE RACK -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('shoe-menu')"><i class="fa-solid fa-shoe-prints"></i> Shoe Rack</button>
            <div id="shoe-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Boots')">Boots</button>
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Dress Shoes')">Dress Shoes</button>
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Heels')">Heels</button>
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Sneakers')">Sneakers</button>
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Sandals')">Sandals</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- NUDE -->
        <div class="category-container">
            <button class="btn" onclick="sendToSL('System', 'Nude')"><i class="fa-solid fa-user"></i> Nude</button>
        </div>
        
        <!-- MINIMIZE -->
        <div class="category-container minimize-container">
            <button class="btn btn-minimize" onclick="sendToSL('System', 'Minimize')"><i class="fa-solid fa-compress"></i> Minimize</button>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slurl = urlParams.get('slurl');

        function toggleMenu(menuId, isNested = false) {
            if (!isNested) {
                let allMenus = document.querySelectorAll('.main-submenu');
                allMenus.forEach(menu => {
                    if (menu.id !== menuId) {
                        menu.style.display = 'none';
                    }
                });
            }

            let selectedMenu = document.getElementById(menuId);
            if (selectedMenu.style.display === 'flex') {
                selectedMenu.style.display = 'none';
            } else {
                selectedMenu.style.display = 'flex';
            }
        }

        function sendToSL(category, slot) {
            let outfitPath = category + "/" + slot;
            
            if (slurl) {
                fetch(slurl, {
                    method: 'POST',
                    body: outfitPath
                }).catch(error => {
                    console.error("Transmission Error:", error);
                });
            } else {
                alert("Cannot find SL Connection. Are you using this inside Second Life?");
            }
        }
    </script>

</body>
</html>
