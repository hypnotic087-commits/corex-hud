<!-- Inside your <script> tag -->
<script>
    // Paste the dynamic URL generated by your HUD into this constant
    const HUD_URL = "INSERT_YOUR_HUD_URL_HERE"; 

    function handleNavClick(id, btn) { 
        const folder = document.getElementById(id); 
        const isCurrentlyActive = btn.classList.contains('glow-active'); 
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('glow-active')); 
        document.querySelectorAll('.folder').forEach(f => f.classList.remove('show')); 
        if (!isCurrentlyActive) { 
            btn.classList.add('glow-active'); 
            folder.classList.add('show'); 
        } 
    }

    function toggleSub(id, headerElement) { 
        document.getElementById(id).classList.toggle('show'); 
    }

    // This function handles sending the command to your in-world HUD
    function sendToHUD(action, category) {
        fetch(HUD_URL, {
            method: 'POST',
            body: 'SYNC:' + action + ':' + category
        });
        
        // Visual feedback
        event.target.classList.add('glow-active');
        setTimeout(() => event.target.classList.remove('glow-active'), 1000);
    }
</script>
