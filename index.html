<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; 
            /* Background image on top 50%, rest is transparent */
            background: url('image_4639de.jpg');
            background-size: 100% 50%;
            background-position: top center; 
            background-repeat: no-repeat; 
            background-color: transparent;
            font-family: 'Segoe UI', sans-serif; 
        }
        .hud-container { 
            background: rgba(40, 40, 40, 0.65); /* High transparency */
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 4px; 
            padding: 25px; 
            width: 600px; 
            max-height: 80vh; 
            overflow-y: auto; 
            color: #E8E8E8; 
        }
        .nav-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .nav-btn { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: #E8E8E8; 
            padding: 15px; 
            flex: 1; 
            text-transform: uppercase; 
            font-weight: bold; 
            font-size: 13px; 
            cursor: pointer; 
        }
        .folder { margin-top: 15px; }
        .header { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 15px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; 
            font-size: 14px; 
            margin-bottom: 10px; 
        }
        .content { display: none; padding-left: 20px; }
        .show { display: block; }
        .category { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 14px; gap: 15px; }
        .slot-group { display: flex; flex: 1; gap: 5px; }
        .style-btn { flex: 1; height: 30px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        .remove-btn { margin-top: 20px; background: rgba(180, 60, 60, 0.3); border: 1px solid rgba(200, 50, 50, 0.4); color: #ffcccc; padding: 15px; width: 100%; text-transform: uppercase; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="hud-container">
    <div class="nav-row">
        <button class="nav-btn" onclick="toggle('nude-f')">Nude</button>
        <button class="nav-btn" onclick="toggle('dresser-f')">Dresser</button>
        <button class="nav-btn" onclick="toggle('closet-f')">Closet</button>
    </div>
    <div class="nav-row">
        <button class="nav-btn" onclick="toggle('wardrobe-f')">Wardrobe</button>
        <button class="nav-btn">Minimize</button>
    </div>

    <div id="nude-f" class="folder content">
        <div class="category"><span>Nude</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <button class="remove-btn">Remove Last Attachment</button>
    </div>

            <div class="category"><span>Panties</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Boxers</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Briefs</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Lingerie</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Stocking and Socks</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        </div>
        <div class="category"><span>Pj's</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <div class="category"><span>Lounge</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <div class="category"><span>Swim</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <button class="remove-btn">Remove Last Attachment</button>
    </div>

    <div id="closet-f" class="folder content">

            <div class="category"><span>Long Sleeve</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Short Sleeve</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Tanks</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        </div>
        <div class="category"><span>Dresses</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <div class="category"><span>Pants</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <div class="category"><span>Skirts</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <div class="category"><span>Shorts</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>

        <div class="category"><span>Swimwear</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        <div class="header" onclick="toggle('seasons-f')">Seasons ▼</div>
        <div id="seasons-f" class="content">
            <div class="category"><span>Spring</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Summer</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Winter</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
            <div class="category"><span>Autumn</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
        </div>
        <button class="remove-btn">Remove Last Attachment</button>
    </div>
</div>
<script>
    function toggle(id) { document.getElementById(id).classList.toggle('show'); }
</script>
</body>
</html>
