<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #121212; color: #fff; font-family: sans-serif; padding: 10px; margin: 0; }
    .menu-btn { display: block; width: 100%; background: #333; color: #fff; padding: 10px; margin: 2px 0; text-align: center; text-transform: uppercase; font-size: 10px; font-weight: bold; cursor: pointer; border: 1px solid #555; }
    .content { display: none; padding: 10px; border: 1px solid #444; background: #1a1a1a; margin-bottom: 5px; }
    .sub-cat { font-size: 11px; color: #aaa; margin-top: 8px; border-bottom: 1px solid #333; padding-bottom: 2px; }
    .slot-btn { width: 30px; font-size: 9px; padding: 4px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; margin: 1px; }
</style>
</head>
<body>

    <button class="menu-btn" onclick="toggle('dresser')">Dresser</button>
    <div id="dresser" class="content"></div>

    <button class="menu-btn" onclick="toggle('closet')">Closet</button>
    <div id="closet" class="content"></div>

    <button class="menu-btn" onclick="toggle('wardrobe')">Wardrobe</button>
    <div id="wardrobe" class="content"></div>

    <script>
        // Setup all categories
        window.onload = function() {
            addContent('dresser', [
                ["Lounge", "Dresser/Lounge"], ["Pj's", "Dresser/Pj's"], ["Swimwear", "Dresser/Swimwear"],
                ["Bra's", "Dresser/Undies/Bra's"], ["Panties", "Dresser/Undies/Panties"], ["Boxer/Briefs", "Dresser/Undies/BoxerBriefs"],
                ["Lingerie", "Dresser/Undies/Lingerie"], ["Stockings", "Dresser/Undies/Stockings"], ["Socks", "Dresser/Undies/Socks"]
            ]);
            addContent('closet', [
                ["Skirts", "Closet/Skirts"], ["Shorts", "Closet/Shorts"], ["Sweaters", "Closet/Sweaters"],
                ["Long Dresses", "Closet/Dresses/Long"], ["Short Dresses", "Closet/Dresses/Short"], ["Dress Shirts", "Closet/Shirts/DressShirts"],
                ["Long Sleeve", "Closet/Shirts/LongSleeve"], ["Short Sleeve", "Closet/Shirts/ShortSleeve"], ["Tanks/T's", "Closet/Shirts/TanksTs"],
                ["Tube Tops", "Closet/Shirts/TubeTops"], ["Dress Pants", "Closet/Pants/DressPants"], ["Casual Pants", "Closet/Pants/Casual"],
                ["Jeans", "Closet/Pants/Jeans"], ["Leggings", "Closet/Pants/Leggings"]
            ]);
            addContent('wardrobe', [
                ["Casual", "Wardrobe/Casual"], ["Club", "Wardrobe/Club"], ["Shopping", "Wardrobe/Shopping"],
                ["Sleep", "Wardrobe/Sleep"], ["Roleplay", "Wardrobe/Roleplay"], ["Gowns", "Wardrobe/Formal/Gowns"],
                ["Suits", "Wardrobe/Formal/Suits"], ["Spring", "Wardrobe/Seasons/Spring"], ["Summer", "Wardrobe/Seasons/Summer"],
                ["Fall", "Wardrobe/Seasons/Fall"], ["Winter", "Wardrobe/Seasons/Winter"]
            ]);
        };

        function addContent(id, items) {
            var container = document.getElementById(id);
            items.forEach(function(item) {
                var html = '<div class="sub-cat">' + item[0] + '</div>';
                for(var i=1; i<=6; i++) {
                    html += `<button class="slot-btn" onclick="send('${item[1]}','style${i}')">${i}</button>`;
                }
                container.innerHTML += html;
            });
        }

        function toggle(id) { 
            var el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block'; 
        }

        function send(part, style) { 
            var f = document.getElementById('sl_form');
            f.action = window.location.hash.substring(1);
            document.getElementById('p_data').value = part + "," + style;
            f.submit();
        }
    </script>
    <iframe name="secret_frame" style="display:none;"></iframe>
    <form id="sl_form" method="POST" target="secret_frame" style="display:none;"><input type="hidden" id="p_data" name="cmd"></form>
</body>
</html>
