<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX//SYNC</title>
    <style>
        :root { 
            --purple-trans: rgba(151, 92, 207, 0.6); 
            --glow: 0 0 15px rgba(151, 92, 207, 0.6); 
        }
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Courier New', monospace; color: #fff; 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
            background: #000;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('purple.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.4; 
            z-index: -1;
        }
        
        .container { 
            width: 90%; max-width: 500px; 
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0, 0, 0, 0.4); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--purple-trans); 
        }
        
        h1 { 
            font-size: 24px; text-align: center; color: #fff; 
            letter-spacing: 4px; text-transform: uppercase; 
            margin: 0 0 20px 0; 
            cursor: pointer; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 300; 
        }
        
        /* Buttons - Reduced padding/size to fit SL prim better */
        .menu-btn, .sub-btn, .nude-btn, .remove-hud-btn { 
            width: 100%; 
            margin: 5px 0; 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--purple-trans); 
            color: #fff; padding: 12px 10px; text-transform: uppercase; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px; cursor: pointer; border-radius: 6px; 
            opacity: 0.8; transition: 0.3s; 
        }

        .slot-btn { 
            width: 35px; height: 30px; font-size: 12px; 
            background: rgba(0,0,0,0.5); color: #fff; 
            border: 1px solid var(--purple-trans); 
            cursor: pointer; margin: 2px; 
        }
        
        .menu-btn:hover, .sub-btn:hover, .nude-btn:hover, .remove-hud-btn:hover, .slot-btn:hover { 
            opacity: 1; border-color: #fff; 
        }
        
        .active-glow { border-color: #fff !important; box-shadow: var(--glow) !important; opacity: 1 !important; }
        
        .slot-container, .submenu-items { display: none; padding: 5px; text-align: center; }
        .content { display: none; width: 100%; }
        .controls { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        
        .ctrl-btn { background: rgba(0,0,0,0.5); border: 1px solid var(--purple-trans); color: #fff; padding: 10px; font-size: 12px; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1 onclick="showHome()">𝙲𝙾𝚁𝙴𝚇//𝚂𝚈𝙽𝙲</h1>
        
        <div id="home">
            <button class="menu-btn" onclick="showCategory('dresser')">Dresser</button>
            <button class="menu-btn" onclick="showCategory('closet')">Closet</button>
            <button class="menu-btn" onclick="showCategory('wardrobe')">Wardrobe</button>
            <button class="nude-btn" onclick="toggleOnlySlots(this)">Nude</button>
            <div class="slot-container">
                <button class="slot-btn" onclick="send(this,'Nude','style1')">1</button>
                <button class="slot-btn" onclick="send(this,'Nude','style2')">2</button>
                <button class="slot-btn" onclick="send(this,'Nude','style3')">3</button>
            </div>
            <button class="remove-hud-btn" onclick="send(this,'HUD','remove')">Remove HUD</button>
        </div>

        <div id="dresser" class="content"></div>
        <div id="closet" class="content"></div>
        <div id="wardrobe" class="content"></div>

        <div id="controls" class="controls">
            <button class="ctrl-btn" onclick="showHome()">Back</button>
            <button class="ctrl-btn" onclick="send(this,'RemoveLast','detach')">Remove</button>
        </div>
    </div>

    <script>
        // ... (Keep your existing window.onload, addCategory, send, toggleSubmenu, toggleOnlySlots, showCategory, and showHome functions here)
    </script>
    <iframe name="secret_frame" style="display:none;"></iframe>
    <form id="sl_form" method="POST" target="secret_frame" style="display:none;"><input type="hidden" id="p_data" name="cmd"></form>
</body>
</html>
