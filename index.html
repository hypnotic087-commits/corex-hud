<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <title>COREX // SYNC</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background: url('closet.jpg') no-repeat center center !important; 
            background-size: cover !important;
            font-family: 'Montserrat', sans-serif; overflow: hidden; color: #ffffff;
        }
        .hud-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(147, 109, 65, 0.35); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; 
            padding: 30px; width: 85%; height: 85%; overflow-y: auto;
            display: flex; gap: 40px;
        }
        .hud-container::-webkit-scrollbar { display: none; }
        
        .hud-title { 
            position: absolute; top: 20px; left: 0; right: 0;
            text-align: center; font-size: 32px; font-weight: 300; 
            text-transform: uppercase; letter-spacing: 6px;
        }

        .nav-column { 
            flex: 1; display: flex; flex-direction: column; gap: 30px; padding-top: 60px;
        }
        
        .nav-btn { 
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); 
            color: #ffffff; padding: 15px; text-transform: uppercase; 
            font-weight: 300; cursor: pointer; width: 100%; 
            font-size: 22px; letter-spacing: 2px;
        }
        .nav-btn.glow-active { border: 2px solid #ffffff; box-shadow: 0 0 10px #ffffff; }
        
        .content-column { flex: 2; padding-top: 80px; }
        .folder { display: none; margin-top: 5px; }
        .folder.show { display: block; }
        
        .header { background: rgba(255, 255, 255, 0.05); padding: 10px; cursor: pointer; margin-top: 5px; text-transform: uppercase; font-weight: 300; }
        .sub-content { display: none; padding-left: 15px; }
        .sub-content.show { display: block; }
        
        .cat-row { padding: 8px; cursor: pointer; border: 1px solid transparent; font-weight: 300; }
        .cat-row.glow-active { border: 1px solid #ffffff; box-shadow: 0 0 8px #ffffff; }
        
        .style-slots { display: none; padding: 5px; background: rgba(0,0,0,0.2); margin: 5px 0; gap: 5px; }
        .style-slots.active { display: flex; }
        .rect-btn { width: 35px; height: 25px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        
        .remove-btn { margin-top: 15px; background: rgba(180, 60, 60, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 10px; width: 100%; text-transform: uppercase; font-weight: 300; cursor: pointer; }
    </style>
</head>
<body>

<div class="hud-container">
    <div class="hud-title">COREX // SYNC</div>
    
    <div class="nav-column">
        <button class="nav-btn" onclick="toggleFolder('dresser-f', this)">Dresser</button>
        <button class="nav-btn" onclick="toggleFolder('closet-f', this)">Closet</button>
        <button class="nav-btn" onclick="toggleFolder('wardrobe-f', this)">Wardrobe</button>
        <button class="nav-btn" onclick="toggleFolder('nude-f', this)">Nude</button>
        <button class="nav-btn" onclick="toggleGlow(this)" style="margin-top: auto;">Minimize</button>
    </div>

    <div class="content-column">
        <div id="nude-f" class="folder"><div class="cat-row" onclick="selectRow(this)">Nude Options</div></div>
        <div id="dresser-f" class="folder">
            <div class="header" onclick="toggleSub('undies-sub')">Undies ▼</div>
            <div id="undies-sub" class="sub-content">
                <div class="cat-row" onclick="selectRow(this)">Bra's</div>
                <div class="cat-row" onclick="selectRow(this)">Panties</div>
                <div class="cat-row" onclick="selectRow(this)">Boxers</div>
                <div class="cat-row" onclick="selectRow(this)">Briefs</div>
                <div class="cat-row" onclick="selectRow(this)">Lingerie</div>
                <div class="cat-row" onclick="selectRow(this)">Stocking and Socks</div>
            </div>
            <div class="cat-row" onclick="selectRow(this)">Pj's</div>
            <div class="cat-row" onclick="selectRow(this)">Lounge</div>
            <div class="cat-row" onclick="selectRow(this)">Swim</div>
            <button class="remove-btn">Remove Last Attachment</button>
        </div>
        <div id="closet-f" class="folder">
            <div class="header" onclick="toggleSub('shirts-sub')">Shirts ▼</div>
            <div id="shirts-sub" class="sub-content">
                <div class="cat-row" onclick="selectRow(this)">Long Sleeve</div>
                <div class="cat-row" onclick="selectRow(this)">Short Sleeve</div>
                <div class="cat-row" onclick="selectRow(this)">Tanks</div>
            </div>
            <div class="cat-row" onclick="selectRow(this)">Dresses</div>
            <div class="cat-row" onclick="selectRow(this)">Pants</div>
            <div class="cat-row" onclick="selectRow(this)">Skirts</div>
            <div class="cat-row" onclick="selectRow(this)">Shorts</div>
            <button class="remove-btn">Remove Last Attachment</button>
        </div>
        <div id="wardrobe-f" class="folder">
            <div class="cat-row" onclick="selectRow(this)">Casual</div>
            <div class="cat-row" onclick="selectRow(this)">Club</div>
            <div class="cat-row" onclick="selectRow(this)">Formal</div>
            <div class="cat-row" onclick="selectRow(this)">Sleep</div>
            <div class="cat-row" onclick="selectRow(this)">Roleplay</div>
            <div class="cat-row" onclick="selectRow(this)">Shopping</div>
            <div class="cat-row" onclick="selectRow(this)">Swimwear</div>
            <div class="header" onclick="toggleSub('seasons-sub')">Seasons ▼</div>
            <div id="seasons-sub" class="sub-content">
                <div class="cat-row" onclick="selectRow(this)">Spring</div>
                <div class="cat-row" onclick="selectRow(this)">Summer</div>
                <div class="cat-row" onclick="selectRow(this)">Winter</div>
                <div class="cat-row" onclick="selectRow(this)">Autumn</div>
            </div>
            <button class="remove-btn">Remove Last Attachment</button>
        </div>
    </div>
</div>

<div id="style-slots-area" class="style-slots">
    <button class="rect-btn"></button><button class="rect-btn"></button>
    <button class="rect-btn"></button><button class="rect-btn"></button>
    <button class="rect-btn"></button><button class="rect-btn"></button>
</div>

<script>
    function toggleFolder(id, btn) {
        document.querySelectorAll('.folder').forEach(f => f.classList.remove('show'));
        document.getElementById(id).classList.add('show');
    }
    function toggleSub(id) { document.getElementById(id).classList.toggle('show'); }
    function toggleGlow(btn) { btn.classList.toggle('glow-active'); }
    function selectRow(element) {
        document.querySelectorAll('.cat-row').forEach(row => row.classList.remove('glow-active'));
        element.classList.add('glow-active');
        const slots = document.getElementById('style-slots-area');
        element.after(slots);
        slots.classList.add('active');
    }
</script>
</body>
</html>
