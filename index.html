<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX//SYNC Vanity</title>
    <style>
        /* Defined the color with transparency variables */
        :root { 
            --purple-trans: rgba(151, 92, 207, 0.6); 
            --glow: 0 0 15px rgba(151, 92, 207, 0.6); 
        }
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; color: #fff; 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
            background: #000;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('closet.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.4; 
            z-index: -1;
        }
        
        .container { 
            width: 70%; max-width: 600px; 
            height: 400px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6); 
            padding: 30px; 
            border-radius: 12px; 
            /* Purple Transparent Border */
            border: 1px solid var(--purple-trans); 
        }
        
        .container::-webkit-scrollbar { width: 7px; }
        /* Purple Transparent Scrollbar */
        .container::-webkit-scrollbar-thumb { background: rgba(151, 92, 207, 0.5); border-radius: 3px; }
        
        h1 { 
            font-size: 28px; text-align: center; color: #fff; 
            letter-spacing: 4px; text-transform: uppercase; 
            margin: 0 0 30px 0; 
            cursor: pointer; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 300; 
        }
        
        /* Menu Buttons */
        .menu-btn, .sub-btn, .nude-btn, .remove-hud-btn { 
            display: block; width: 70%; margin: 0 auto 10px auto; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--purple-trans); 
            color: #fff; padding: 20px 10px; text-transform: uppercase; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 25px; font-weight: 500; letter-spacing: 2px; cursor: pointer; border-radius: 6px; 
            opacity: 0.7; transition: 0.3s; 
        }

        /* Slot Buttons */
        .slot-btn { 
            width: 45px; height: 35px; font-size: 14px; font-family: 'Courier New', Courier, monospace; 
            background: rgba(0,0,0,0.6); color: #fff; 
            border: 1px solid var(--purple-trans); 
            cursor: pointer; margin: 3px; 
            transition: box-shadow 0.5s ease, border-color 0.5s ease, opacity 0.3s;
        }
        
        .menu-btn:hover, .sub-btn:hover, .nude-btn:hover, .remove-hud-btn:hover, .slot-btn:hover { opacity: 1; }
        
        /* Glow style updated to match purple */
        .active-glow { border-color: #fff !important; box-shadow: var(--glow) !important; opacity: 1 !important; }
        
        .slot-container, .submenu-items { display: none; padding: 10px; text-align: center; }
        
        .content { display: none; }
        .controls { display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        
        .ctrl-btn { background: rgba(0,0,0,0.7); border: 1px solid var(--purple-trans); color: #fff; padding: 18px; font-size: 12px; font-family: 'Courier New', Courier, monospace; cursor: pointer; border-radius: 4px; text-transform: uppercase; opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1 onclick="showHome()">𝙲𝙾𝚁𝙴𝚇//𝚂𝚈𝙽𝙲</h1>
        
        <div id="home">
            <button class="menu-btn" onclick="showCategory('dresser')">Dresser</button>
            <button class="menu-btn" onclick="showCategory('closet')">Closet</button>
            <button class="menu-btn" onclick="showCategory('wardrobe')">Wardrobe</button>
            <button class="nude-btn" onclick="toggleOnlySlots(this)">Nude</button>
            <div class="slot-container">
                <button class="slot-btn" onclick="send(this,'Nude','style1')">1</button>
                <button class="slot-btn" onclick="send(this,'Nude','style2')">2</button>
                <button class="slot-btn" onclick="send(this,'Nude','style3')">3</button>
                <button class="slot-btn" onclick="send(this,'Nude','style4')">4</button>
                <button class="slot-btn" onclick="send(this,'Nude','style5')">5</button>
                <button class="slot-btn" onclick="send(this,'Nude','style6')">6</button>
            </div>
            <button class="remove-hud-btn" onclick="send(this,'HUD','remove')">Remove HUD</button>
        </div>

        <div id="dresser" class="content"></div>
        <div id="closet" class="content"></div>
        <div id="wardrobe" class="content"></div>

        <div id="controls" class="controls">
            <button class="ctrl-btn" onclick="showHome()">Back</button>
            <button class="ctrl-btn" onclick="send(this,'RemoveLast','detach')">Remove Last Item</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            addCategory('dresser', [["Lounge", "Dresser/Lounge"], ["Pj's", "Dresser/Pj's"], ["Swimwear", "Dresser/Swimwear"], ["Undies", null, [["Bra's", "Dresser/Undies/Bra's"], ["Panties", "Dresser/Undies/Panties"], ["Boxer/Briefs", "Dresser/Undies/BoxerBriefs"], ["Lingerie", "Dresser/Undies/Lingerie"], ["Stockings", "Dresser/Undies/Stockings"], ["Socks", "Dresser/Undies/Socks"]]]]);
            addCategory('closet', [["Skirts", "Closet/Skirts"], ["Shorts", "Closet/Shorts"], ["Sweaters", "Closet/Sweaters"], ["Dresses", null, [["Long", "Closet/Dresses/Long"], ["Short", "Closet/Dresses/Short"]]], ["Shirts", null, [["Dress Shirts", "Closet/Shirts/DressShirts"], ["Long Sleeve", "Closet/Shirts/LongSleeve"], ["Short Sleeve", "Closet/Shirts/ShortSleeve"], ["Tanks/T's", "Closet/Shirts/TanksTs"], ["Tube Tops", "Closet/Shirts/TubeTops"]]], ["Pants", null, [["Slacks", "Closet/Pants/DressPants"], ["Casual", "Closet/Pants/Casual"], ["Jeans", "Closet/Pants/Jeans"], ["Leggings", "Closet/Pants/Leggings"]]]]);
            addCategory('wardrobe', [["Casual", "Wardrobe/Casual"], ["Club", "Wardrobe/Club"], ["Shopping", "Wardrobe/Shopping"], ["Sleep", "Wardrobe/Sleep"], ["Roleplay", "Wardrobe/Roleplay"], ["Formal", null, [["Gowns", "Wardrobe/Formal/Gowns"], ["Suits", "Wardrobe/Formal/Suits"]]], ["Seasons", null, [["Spring", "Wardrobe/Seasons/Spring"], ["Summer", "Wardrobe/Seasons/Summer"], ["Fall", "Wardrobe/Seasons/Fall"], ["Winter", "Wardrobe/Seasons/Winter"]]]]);
        };

        function addCategory(id, items) { 
            var container = document.getElementById(id); 
            items.forEach(function(item) { 
                var btn = document.createElement('button'); btn.className = 'sub-btn'; btn.innerText = item[0]; container.appendChild(btn); 
                if (item[2]) { 
                    var subDiv = document.createElement('div'); subDiv.className = 'submenu-items';
                    item[2].forEach(sub => { 
                        var subBtn = document.createElement('button'); subBtn.className = 'sub-btn'; subBtn.innerText = sub[0]; 
                        var slots = document.createElement('div'); slots.className = 'slot-container'; 
                        for(var i=1; i<=6; i++) slots.innerHTML += `<button class="slot-btn" onclick="send(this,'${sub[1]}','style${i}')">${i}</button>`;
                        subBtn.onclick = function() { toggleOnlySlots(this); }; 
                        subDiv.appendChild(subBtn); subDiv.appendChild(slots); 
                    }); 
                    btn.onclick = function() { toggleSubmenu(this, subDiv); };
                    container.appendChild(subDiv); 
                } else { 
                    btn.onclick = function() { toggleOnlySlots(this); }; 
                    var div = document.createElement('div'); div.className = 'slot-container'; 
                    for(var i=1; i<=6; i++) div.innerHTML += `<button class="slot-btn" onclick="send(this,'${item[1]}','style${i}')">${i}</button>`;
                    container.appendChild(div); 
                } 
            }); 
        }

        function send(btn, part, style) { 
            var allButtons = document.querySelectorAll('button');
            allButtons.forEach(s => s.classList.remove('active-glow'));
            btn.classList.add('active-glow');
            setTimeout(function() { btn.classList.remove('active-glow'); }, 2000);
            
            var f = document.getElementById('sl_form'); 
            f.action = window.location.hash.substring(1); 
            document.getElementById('p_data').value = "cmd=" + part + "," + style; 
            f.submit(); 
        }

        function toggleSubmenu(btn, subDiv) {
            var parent = btn.parentElement;
            var isOpening = (subDiv.style.display !== 'block');
            subDiv.style.display = isOpening ? 'block' : 'none';
            btn.classList.toggle('active-glow');
            Array.from(parent.children).forEach(child => {
                if (child !== btn && child !== subDiv && child.className.includes('sub-btn')) {
                    child.style.display = isOpening ? 'none' : 'block';
                }
            });
        }

        function toggleOnlySlots(btn) {
            var slots = btn.nextElementSibling;
            slots.style.display = (slots.style.display === 'block') ? 'none' : 'block';
            btn.classList.toggle('active-glow');
        }

        function showCategory(id) { 
            document.getElementById('home').style.display = 'none'; 
            document.getElementById(id).style.display = 'block'; 
            document.getElementById('controls').style.display = 'grid';
        }
        function showHome() { 
            document.getElementById('home').style.display = 'block';
            document.querySelectorAll('.content').forEach(c => {
                c.style.display = 'none';
                c.querySelectorAll('.sub-btn').forEach(b => { b.style.display = 'block'; b.classList.remove('active-glow'); });
                c.querySelectorAll('.submenu-items, .slot-container').forEach(s => s.style.display = 'none');
            });
            document.getElementById('controls').style.display = 'none';
        }
    </script>
    <iframe name="secret_frame" style="display:none;"></iframe>
    <form id="sl_form" method="POST" target="secret_frame" style="display:none;"><input type="hidden" id="p_data" name="cmd"></form>
</body>
</html>
