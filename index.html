<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <title>COREX // SYNC</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; background: url('closet.jpg') no-repeat center center !important; background-size: cover !important; font-family: 'Montserrat', sans-serif; overflow: hidden; color: #ffffff; }
        .hud-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; 
            padding: 30px; width: 85%; height: 85%; overflow-y: auto; display: flex; gap: 40px; }
        .hud-title { position: absolute; top: 20px; left: 0; right: 0; text-align: center; font-size: 42px; font-weight: 300; text-transform: uppercase; letter-spacing: 8px; }
        .nav-column { flex: 1; display: flex; flex-direction: column; gap: 20px; padding-top: 80px; }
        .nav-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 15px; text-transform: uppercase; cursor: pointer; }
        .content-column { flex: 2; padding-top: 80px; }
        .folder { display: block; margin-top: 20px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px; }
        .header { cursor: pointer; padding: 10px; background: rgba(255, 255, 255, 0.1); text-transform: uppercase; font-weight: bold; }
        .sub-content { display: block; padding-left: 20px; margin-top: 10px; }
        .cat-container { display: flex; align-items: center; gap: 15px; margin: 10px 0; }
        .slot-small { width: 30px; height: 30px; background: rgba(255, 255, 255, 0.2); cursor: pointer; border: 1px solid #fff; }
        .remove-btn { margin-top: 20px; padding: 10px; background: rgba(180, 60, 60, 0.5); border: none; color: #fff; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="hud-container">
    <div class="hud-title">COREX // SYNC</div>
    <div class="nav-column">
        <button class="nav-btn" onclick="sendToHUD('open', 'wardrobe')">Wardrobe</button>
        <button class="nav-btn" onclick="sendToHUD('open', 'dresser')">Dresser</button>
        <button class="nav-btn" onclick="sendToHUD('open', 'closet')">Closet</button>
        <button class="nav-btn" onclick="sendToHUD('open', 'nude')">Nude</button>
    </div>

    <div class="content-column">
        <div id="dresser-f" class="folder">
            <div class="header">Undies ▼</div>
            <div class="sub-content">
                <div class="cat-container">
                    <div>Bra's</div>
                    <div class="slot-small" onclick="sendToHUD('load_style|bras|1')"></div>
                </div>
            </div>
            <button class="remove-btn" onclick="sendToHUD('remove_last')">Remove Last</button>
        </div>
    </div>
</div>

<script>
    const HUD_URL = "INSERT_YOUR_HUD_URL_HERE"; 
    function sendToHUD(action, cat) {
        let cmd = cat ? action + '|' + cat : action;
        fetch(HUD_URL, { method: 'POST', body: 'SYNC:' + cmd });
    }
</script>
</body>
</html>
