<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: 'Courier New', Courier, monospace; 
            color: #fff; 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        .container { 
            width: 100%; height: 100%; 
            /* THIS IS YOUR BACKGROUND IMAGE */
            background-image: url('closet.jpg'); 
            background-size: cover; 
            background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* This creates the dark "glass" overlay */
        .overlay {
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }

        h1 { 
            font-size: 32px; letter-spacing: 6px; margin-bottom: 50px; text-transform: uppercase; font-weight: 300;
        }

        .menu-btn, .sub-btn, .nude-btn, .remove-hud-btn { 
            width: 300px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: #fff; padding: 20px; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s;
            border-radius: 2px;
        }

        .menu-btn:hover, .sub-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .slot-container { display: none; margin-bottom: 10px; }
        .slot-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid #555; cursor: pointer; margin: 2px; }
        .content { display: none; }
        .controls { display: none; margin-top: 20px; }
        .ctrl-btn { background: none; border: 1px solid #777; color: #fff; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="overlay">
            <h1 onclick="showHome()">𝙲𝙾𝚁𝙴𝚇//𝚂𝚈𝙽𝙲</h1>
            
            <div id="home">
                <button class="menu-btn" onclick="showCategory('dresser')">Dresser</button>
                <button class="menu-btn" onclick="showCategory('closet')">Closet</button>
                <button class="menu-btn" onclick="showCategory('wardrobe')">Wardrobe</button>
                <button class="nude-btn" onclick="toggleOnlySlots(this)">Nude</button>
                <div class="slot-container">
                    <button class="slot-btn" onclick="send('Nude','style1')">1</button>
                    <button class="slot-btn" onclick="send('Nude','style2')">2</button>
                    <button class="slot-btn" onclick="send('Nude','style3')">3</button>
                </div>
                <button class="nude-btn" onclick="send('HUD','remove')">Remove HUD</button>
            </div>

            <div id="dresser" class="content"></div>
            <div id="closet" class="content"></div>
            <div id="wardrobe" class="content"></div>

            <div id="controls" class="controls">
                <button class="ctrl-btn" onclick="showHome()">Back</button>
            </div>
        </div>
    </div>

    <script>
        // ... (Keep your existing script functions here) ...
        function showCategory(id) { document.getElementById('home').style.display='none'; document.getElementById(id).style.display='block'; document.getElementById('controls').style.display='block'; }
        function showHome() { document.getElementById('home').style.display='block'; document.querySelectorAll('.content').forEach(c => c.style.display='none'); document.getElementById('controls').style.display='none'; }
        function toggleOnlySlots(btn) { var s = btn.nextElementSibling; s.style.display = (s.style.display==='block')?'none':'block'; }
        function send(p, s) { var f = document.getElementById('sl_form'); f.action = window.location.hash.substring(1); document.getElementById('p_data').value = p+","+s; f.submit(); }
    </script>
    <iframe name="secret_frame" style="display:none;"></iframe>
    <form id="sl_form" method="POST" target="secret_frame" style="display:none;"><input type="hidden" id="p_data" name="cmd"></form>
</body>
</html>
