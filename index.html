<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 10px; }
        h2 { border-bottom: 2px solid #555; padding-bottom: 10px; color: #00d4ff; }
        h3 { color: #aaa; margin: 15px 0 5px; font-size: 14px; text-transform: uppercase; }
        .btn { display: block; width: 85%; margin: 3px auto; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn:hover { background: #444; }
        details { background: #1a1a1a; margin: 10px 0; padding: 10px; border: 1px solid #333; border-radius: 5px; }
        summary { cursor: pointer; font-weight: bold; padding: 5px; outline: none; }
    </style>
</head>
<body>

    <h2>Corex_Sync Wardrobe</h2>

    <form action="" method="POST">
        <button type="submit" class="btn" style="background:#500;" name="cmd" value="Nude,remove">Nude</button>
    </form>

    <details>
        <summary>DRESSER</summary>
        <h3>Lounge</h3>
        <form action="" method="POST">
            <button type="submit" class="btn" name="cmd" value="Dresser/Lounge,style1">Style 1</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Lounge,style2">Style 2</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Lounge,style3">Style 3</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Lounge,style4">Style 4</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Lounge,style5">Style 5</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Lounge,style6">Style 6</button>
        </form>

        <h3>Undies (Sub-menu)</h3>
        <form action="" method="POST">
            <p style="font-size:9px; color:#666; margin:10px 0 2px;">BRA'S</p>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Bra's,style1">1</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Bra's,style2">2</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Bra's,style3">3</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Bra's,style4">4</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Bra's,style5">5</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Bra's,style6">6</button>
            
            <p style="font-size:9px; color:#666; margin:10px 0 2px;">PANTIES</p>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Panties,style1">1</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Panties,style2">2</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Panties,style3">3</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Panties,style4">4</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Panties,style5">5</button>
            <button type="submit" class="btn" name="cmd" value="Dresser/Undies/Panties,style6">6</button>
        </form>
    </details>

    <details>
        <summary>CLOSET</summary>
        <h3>Dresses</h3>
        <form action="" method="POST">
            <button type="submit" class="btn" name="cmd" value="Closet/Dresses,style1">1</button>
            <button type="submit" class="btn" name="cmd" value="Closet/Dresses,style2">2</button>
            <button type="submit" class="btn" name="cmd" value="Closet/Dresses,style3">3</button>
            <button type="submit" class="btn" name="cmd" value="Closet/Dresses,style4">4</button>
            <button type="submit" class="btn" name="cmd" value="Closet/Dresses,style5">5</button>
            <button type="submit" class="btn" name="cmd" value="Closet/Dresses,style6">6</button>
        </form>
    </details>

    <details>
        <summary>WARDROBE</summary>
        <h3>Casual</h3>
        <form action="" method="POST">
            <button type="submit" class="btn" name="cmd" value="Wardrobe/Casual,style1">1</button>
            <button type="submit" class="btn" name="cmd" value="Wardrobe/Casual,style2">2</button>
            <button type="submit" class="btn" name="cmd" value="Wardrobe/Casual,style3">3</button>
            <button type="submit" class="btn" name="cmd" value="Wardrobe/Casual,style4">4</button>
            <button type="submit" class="btn" name="cmd" value="Wardrobe/Casual,style5">5</button>
            <button type="submit" class="btn" name="cmd" value="Wardrobe/Casual,style6">6</button>
        </form>
    </details>

</body>
</html>
